<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendyReels - Watch Trending Videos</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>▶️</text></svg>">
</head>
<body>
    <!-- Header -->
    <header class="main-header">
        <div class="header-left">
            <button class="menu-toggle" aria-label="Menu">☰</button>
            <a href="/" class="logo">
                <span class="logo-icon">▶</span>
                <span class="logo-text">TrendyReels</span>
            </a>
        </div>
        <div class="header-center">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search videos..." autocomplete="off">
                <button id="searchBtn" aria-label="Search">🔍</button>
            </div>
        </div>
        <div class="header-right">
            <button id="themeToggle" aria-label="Toggle theme">🌙</button>
            <a href="admin.html" class="admin-link" title="Admin Panel">⚙️</a>
        </div>
    </header>

    <!-- Category Pills -->
    <nav class="category-nav" id="categoryNav">
        <div class="category-scroll">
            <button class="category-pill active" data-category="all">All</button>
            <!-- Categories will be populated by JS -->
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Video Grid -->
        <section class="video-grid" id="videoGrid">
            <!-- Videos rendered by JS -->
        </section>
    </main>

    <!-- Video Player Modal -->
    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="video-player-container">
                <div id="videoPlayer"></div>
                <div class="video-actions">
                    <button id="downloadBtn" class="action-btn" style="display:none">⬇ Download</button>
                    <button id="shareBtn" class="action-btn">📤 Share</button>
                </div>
                <h3 id="modalVideoTitle" class="modal-title"></h3>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="main-footer">
        <div class="footer-content">
            <div class="footer-section">
                <h4>Quick Links</h4>
                <ul>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="privacy.html">Privacy</a></li>
                    <li><a href="dmca.html">DMCA</a></li>
                    <li><a href="disclaimer.html">Disclaimer</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h4>Contact Us</h4>
                <div class="contact-icons">
                    <a href="mailto:maqsoodhassansolangi@gmail.com" target="_blank" title="Email">✉️</a>
                    <a href="https://wa.me/923062948990" target="_blank" title="WhatsApp">💬</a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>Developed by MH Developers</p>
            <p>&copy; 2026 TrendyReels — All Rights Reserved</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <!-- Eruda Console for Mobile Debugging -->
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
</body>
              </html>
