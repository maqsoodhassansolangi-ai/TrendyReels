<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendyReels - Watch Trending Videos</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>▶️</text></svg>">
</head>
<body>

    <!-- Header -->
    <header class="main-header">
        <div class="header-left">
            <a href="/" class="logo">
                <span class="logo-icon">▶</span>
                <span class="logo-text">TrendyReels</span>
            </a>
        </div>
        <div class="header-center">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search videos..." autocomplete="off">
                <button id="searchBtn" aria-label="Search">🔍</button>
                <!-- ✅ NEW: Search Suggestions (1) -->
                <div id="searchSuggestions"></div>
            </div>
        </div>
        <div class="header-right">
            <button id="themeToggle" aria-label="Toggle theme">🌙</button>
            <!-- ✅ NEW: Reels Toggle Button (added here) -->
            <button id="reelsToggleBtn" aria-label="Reels" style="background:none; border:none; color:white; font-size:1.3rem; cursor:pointer; font-weight:500;">🎬 Reels</button>
        </div>
    </header>


    <!-- Category Pills -->
    <nav class="category-nav" id="categoryNav">
        <div class="category-scroll">
            <button class="category-pill active" data-category="all">All</button>
        </div>
    </nav>


    <!-- Main Content -->
    <main class="main-content">
        <!-- Video Grid -->
        <section class="video-grid" id="videoGrid">
            <!-- Videos rendered by JS -->
        </section>
        <!-- ✅ NEW: History Section (2) -->
        <div class="history-section" id="historySection" style="display:none;">
            <h3 style="margin-bottom:6px;">⏳ Recently Watched</h3>
            <div class="history-grid" id="historyGrid"></div>
        </div>
    </main>


    <!-- Video Player Modal -->
    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="video-player-container">
                <div id="videoPlayer"></div>
                <div class="video-actions">
                    <button id="downloadBtn" class="action-btn" style="display:none">⬇ Download</button>
                    <button id="shareBtn" class="action-btn">📤 Share</button>
                    <!-- ✅ NEW: Copy Link Button (3) -->
                    <button id="copyLinkBtn" class="action-btn" style="background:transparent; border:1px solid #666; color:white;">🔗 Copy Link</button>
                </div>
                <h3 id="modalVideoTitle" class="modal-title"></h3>
            </div>
        </div>
    </div>


    <!-- ✅ NEW: Reels Modal (added here) -->
    <div id="reelsModal" class="modal">
        <div class="modal-content" style="max-width:100%; width:100%; height:100%; background:#000; padding:0;">
            <button id="closeReelsBtn" style="position:absolute; top:20px; right:20px; background:rgba(255,255,255,0.2); border:none; color:white; font-size:2rem; width:50px; height:50px; border-radius:50%; cursor:pointer; z-index:100;">&times;</button>
            <div id="reelsContainer" style="width:100%; height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; overflow:hidden; position:relative;">
                <div id="reelsPlayer" style="width:100%; height:100%; max-width:500px; max-height:800px;"></div>
                <div style="position:absolute; bottom:80px; left:20px; color:white; z-index:10; text-align:left; width:80%;">
                    <h2 id="reelsTitle" style="font-size:1.2rem; margin:0;"></h2>
                    <p id="reelsCategory" style="font-size:0.9rem; opacity:0.7; margin:0;"></p>
                </div>
                <div style="position:absolute; right:20px; bottom:100px; display:flex; flex-direction:column; gap:20px; z-index:10;">
                    <button id="reelsLikeBtn" style="background:rgba(255,255,255,0.2); border:none; color:white; font-size:1.8rem; width:50px; height:50px; border-radius:50%; cursor:pointer;">👍</button>
                    <button id="reelsCommentBtn" style="background:rgba(255,255,255,0.2); border:none; color:white; font-size:1.8rem; width:50px; height:50px; border-radius:50%; cursor:pointer;">💬</button>
                    <button id="reelsShareBtn" style="background:rgba(255,255,255,0.2); border:none; color:white; font-size:1.8rem; width:50px; height:50px; border-radius:50%; cursor:pointer;">📤</button>
                    <button id="reelsDownloadBtn" style="background:rgba(255,255,255,0.2); border:none; color:white; font-size:1.8rem; width:50px; height:50px; border-radius:50%; cursor:pointer; display:none;">⬇</button>
                </div>
            </div>
        </div>
    </div>


    <!-- NEW FOOTER STARTS HERE -->
    <footer class="main-footer">
        <div class="footer-links-row">
            <a href="sitemap.xml">Sitemap</a>
            <a href="dmca.html">DMCA</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
        
        <div class="footer-icons-row">
            <a href="mailto:maqsoodhassansolangi@gmail.com" target="_blank" class="social-icon" title="Email">

            </a>

            </a>
        </div>
        
        <div class="footer-bottom-text">
            <p>Developed by MH Developers</p>
            <p>&copy; 2026 TrendyReels — All Rights Reserved</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script type="text/javascript" src="user.js"></script>

    <!-- Eruda Console for Mobile Debugging -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

</body>
</html>
